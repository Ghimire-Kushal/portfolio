databases:
  - name: my-app-db
    plan: free

services:
  - type: web
    name: kushal-portfolio
    runtime: docker
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: my-app-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production